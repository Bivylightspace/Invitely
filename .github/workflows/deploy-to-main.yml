name: Deploy to main

on:
  push:
    branches:
      - deployment
  pull_request:
    branches:
      - deployment

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff

      - name: Run tests
        run: pytest -q

      - name: Lint with Ruff
        run: ruff check .

      - name: Compile Python
        run: python -m compileall . -q

      - name: Start app and verify it boots
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/app.log 2>&1 &
          APP_PID=$!
          sleep 10
          kill $APP_PID
          if grep -q "Uvicorn running on" /tmp/app.log; then
            echo "App started successfully"
          else
            cat /tmp/app.log
            exit 1
          fi

      - name: Create or update pull request to main
        if: github.ref == 'refs/heads/deployment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view --base main --head deployment >/dev/null 2>&1; then
            echo "Pull request already exists."
          else
            gh pr create --base main --head deployment \
              --title "Deploy deployment to main" \
              --body "Automated deployment pull request from the deployment branch."
          fi

      - name: Merge pull request into main
        if: github.ref == 'refs/heads/deployment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --delete-branch --admin
